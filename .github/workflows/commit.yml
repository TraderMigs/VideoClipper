name: Auto Commit System

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'File path to write'
        required: true
      commit_message:
        description: 'Commit message'
        required: true
      content:
        description: 'File content'
        required: true

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write file
        run: |
          echo "${{ github.event.inputs.content }}" > "${{ github.event.inputs.file_path }}"

      - name: Commit and push
        run: |
          git config user.name "TraderMigs"
          git config user.email "you@example.com"
          git add .
          git commit -m "${{ github.event.inputs.commit_message }}" || echo "No changes"
          git push
